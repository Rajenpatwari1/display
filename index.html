<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Sales Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Premium Silicon Valley Typography: Outfit for UI, Space Grotesk for Data/Numbers -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Outfit"', 'sans-serif'],
                        mono: ['"Space Grotesk"', 'monospace'],
                    },
                    colors: {
                        'obsidian': '#030303',
                        'glass-panel': 'rgba(20, 20, 20, 0.4)',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                        'accent-gold': '#F4D06F',
                        'accent-silver': '#E2E8F0',
                        'accent-bronze': '#D97706',
                        'accent-cyan': '#00E5FF',
                        'text-muted': '#8A8F98'
                    },
                    animation: {
                        'blur-fade': 'blurFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-left': 'slideLeftBlur 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'spin-slow': 'spin 15s linear infinite',
                        'spin-slow-reverse': 'spin 10s linear infinite reverse',
                        'float': 'floating 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blurFade: { 
                            '0%': { opacity: 0, filter: 'blur(15px)', transform: 'scale(0.95) translateY(20px)' }, 
                            '100%': { opacity: 1, filter: 'blur(0)', transform: 'scale(1) translateY(0)' } 
                        },
                        slideLeftBlur: { 
                            '0%': { opacity: 0, filter: 'blur(10px)', transform: 'translateX(60px)' }, 
                            '100%': { opacity: 1, filter: 'blur(0)', transform: 'translateX(0)' } 
                        },
                        floating: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ABSOLUTE 1-PAGE LOCK & HARDWARE ACCELERATION FOR SMART TVs */
        body, html {
            background-color: #050508; /* Deep OLED black */
            color: #ffffff;
            height: 100vh; height: 100dvh;
            width: 100vw;
            margin: 0; padding: 0;
            overflow: hidden; 
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
        }

        /* TV-Optimized Background: NO GPU-heavy blurs. Pure CSS Gradients. */
        .tv-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(circle at 15% 50%, rgba(20, 20, 35, 1) 0%, rgba(5, 5, 8, 1) 50%);
        }
        .tv-grid {
            position: fixed; inset: 0; z-index: 0; opacity: 0.1;
            background-image: linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* TV-Optimized Glass: NO backdrop-filter. It crashes Android TVs. */
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 30, 40, 0.95) 0%, rgba(15, 15, 20, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 2vh;
            box-shadow: 0 2vh 4vh rgba(0, 0, 0, 0.5); /* Scaled shadow */
            position: relative;
            overflow: hidden;
            transform: translateZ(0); /* Force Hardware Acceleration */
        }

        /* Exact TV Viewport Scaling (vh/vw) - Guarantees it looks huge on 55" */
        .title-text { font-size: 3vh; letter-spacing: 0.2em; }
        .hero-name { font-size: 5vh; line-height: 1.1; font-weight: 800; letter-spacing: -0.02em; }
        .hero-rev { font-size: 9vh; line-height: 1; font-weight: 700; }
        .hero-tag { font-size: 1.8vh; padding: 0.8vh 2vh; border-radius: 0.5vh; }
        
        .list-name { font-size: 3.5vh; line-height: 1.2; font-weight: 600; }
        .list-rev { font-size: 4.5vh; line-height: 1; font-weight: 700; }
        .list-tag { font-size: 1.5vh; letter-spacing: 0.15em; }

        .currency-symbol { font-family: 'Outfit', sans-serif; font-weight: 300; opacity: 0.5; margin-right: 0.5vh; font-size: 0.7em; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* Hardware Accelerated Rings */
        .hero-ring { 
            position: absolute; inset: -1.5vh; border-radius: 50%; 
            border: 0.3vh solid rgba(244, 208, 111, 0.15);
            border-top-color: #F4D06F;
            animation: spin 8s linear infinite;
            transform: translateZ(0);
        }

        /* TV-Optimized Progress Lines */
        .progress-line { height: 0.8vh; width: 100%; background: rgba(255,255,255,0.05); margin-top: auto; position: absolute; bottom: 0; left: 0;}
        .progress-line-fill { 
            height: 100%; border-radius: 0 0.5vh 0.5vh 0; 
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            transform: translateZ(0);
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* HARDWARE ACCELERATED TV ANIMATIONS */
        @keyframes tvSlideIn {
            0% { opacity: 0; transform: translateX(10vw) translateZ(0); }
            100% { opacity: 1; transform: translateX(0) translateZ(0); }
        }
        @keyframes tvPopIn {
            0% { opacity: 0; transform: scale(0.9) translateZ(0); }
            100% { opacity: 1; transform: scale(1) translateZ(0); }
        }
        .animate-tv-slide { 
            animation: tvSlideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards; 
            will-change: transform, opacity; 
        }
        .animate-tv-pop { 
            animation: tvPopIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) backwards; 
            will-change: transform, opacity; 
        }
    </style>
</head>
<body class="antialiased text-white flex flex-col p-[2vh] gap-[2vh]">

    <!-- PERFORMANCE TV BACKGROUND -->
    <div class="tv-bg"></div>
    <div class="tv-grid"></div>

    <!-- HEADER -->

                <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w400" 
                     alt="Logo" class="h-[3vh] w-auto object-contain"

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-IN', { hour12: false });
        }, 1000);

        // TV STABILITY ENGINE: Auto-Refresh Page every 5 minutes to clean TV RAM completely & avoid OS Crashes
        const TV_AUTO_RELOAD_MINUTES = 5;
        setTimeout(() => {
            window.location.reload();
        }, TV_AUTO_RELOAD_MINUTES * 60 * 1000);

        // TV KEEP-ALIVE AUDIO HEARTBEAT (Prevents TV OS from auto-closing browser)
        function initTvKeepAlive() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // Silent heartbeat tone every 25 seconds
                setInterval(() => {
                    if (ctx.state === 'suspended') ctx.resume();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    gain.gain.value = 0.0001; // Inaudible
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                }, 25000);
            } catch (e) {
                console.log("Audio Heartbeat not supported, fallback active");
            }
        }

        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 20000; // Safe 20s interval for data polling
        let previousDataHash = "";
        let maxSalesBenchmark = 1; 

        const loader = document.getElementById('loader');

        // Robust CSV Parser
        function parseCSV(text) {
            const result = []; let row = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        function formatRupees(num) {
            const formatted = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 }).format(num);
            return `<span class="currency-symbol">₹</span>${formatted}`;
        }

        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!document.contains(element)) return; 
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 5); 
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        function buildHeroCard(employee) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full relative z-10 bg-black" onerror="this.onerror=null; this.outerHTML='<div class=\\'w-full h-full rounded-full relative z-10 bg-[#111] border border-white/10 flex items-center justify-center text-white/30 text-[10vh] font-sans\\'>${initial}</div>';">`
                : `<div class="w-full h-full rounded-full relative z-10 bg-[#111] border border-white/10 flex items-center justify-center text-white/30 text-[10vh] font-sans">${initial}</div>`;

            const tlFirst = employee.tl.split(/\s+/)[0] || 'N/A';
            const rmFirst = employee.rm.split(/\s+/)[0] || 'N/A';
            
            let tagsHtml = "";
            if (employee.tl.toLowerCase() !== employee.name.toLowerCase() && employee.tl.toLowerCase() !== employee.rm.toLowerCase() && tlFirst !== 'N/A') {
                tagsHtml += `<div class="font-mono hero-tag text-accent-cyan tracking-[0.2em] uppercase bg-accent-cyan/10 border border-accent-cyan/20">TL // ${tlFirst}</div>`;
            }
            if (rmFirst !== 'N/A') {
                tagsHtml += `<div class="font-mono hero-tag text-accent-gold tracking-[0.2em] uppercase bg-accent-gold/10 border border-accent-gold/20">MGR // ${rmFirst}</div>`;
            }

            return `
                <div class="w-full h-full flex flex-col items-center justify-center relative animate-tv-pop">
                    <div class="z-10 flex flex-col items-center w-full">
                        
                        <!-- MVP Badge -->
                        <div class="flex items-center gap-[1vh] border border-accent-gold/40 bg-accent-gold/10 px-[2.5vh] py-[0.8vh] rounded-full mb-[4vh]">
                            <div class="w-[1vh] h-[1vh] bg-accent-gold rounded-full"></div>
                            <span class="text-accent-gold font-sans text-[1.8vh] font-bold tracking-[0.4em] uppercase">MVP // 01</span>
                            <div class="w-[1vh] h-[1vh] bg-accent-gold rounded-full"></div>
                        </div>
                        
                        <!-- Massive TV Avatar -->
                        <div class="relative w-[36vh] h-[36vh] rounded-full p-[1vh] mb-[4vh]">
                            <div class="hero-ring"></div>
                            <div class="w-full h-full rounded-full overflow-hidden border border-white/10 relative z-20 bg-[#050505]">
                                ${photoHtml}
                            </div>
                        </div>

                        <!-- Huge TV Name -->
                        <h2 class="font-sans hero-name text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 mb-[2vh] text-center w-full px-[2vh] truncate">${employee.name}</h2>
                        
                        <div class="flex flex-col items-center gap-[1vh] mb-[4vh]">
                            ${tagsHtml}
                        </div>
                        
                        <!-- Huge TV Revenue -->
                        <div class="w-full relative text-center">
                            <div class="font-mono hero-rev text-[#F4D06F] numeric-counter relative z-10" data-target-value="${employee.sales}">
                                <span class="currency-symbol text-[#F4D06F]">₹</span>0
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildListCard(employee, rank) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full" onerror="this.onerror=null; this.outerHTML='<div class=\\'w-full h-full rounded-full bg-[#111] flex items-center justify-center text-white/30 text-[6vh] font-sans\\'>${initial}</div>';">`
                : `<div class="w-full h-full rounded-full bg-[#111] flex items-center justify-center text-white/30 text-[6vh] font-sans">${initial}</div>`;

            const tlFirst = employee.tl.split(/\s+/)[0] || 'N/A';
            const rmFirst = employee.rm.split(/\s+/)[0] || 'N/A';
            
            let listTagsHtml = "";
            if (employee.tl.toLowerCase() !== employee.name.toLowerCase() && employee.tl.toLowerCase() !== employee.rm.toLowerCase() && tlFirst !== 'N/A') {
                listTagsHtml += `
                <div class="flex items-center mb-[0.5vh]">
                    <div class="w-[0.8vh] h-[0.8vh] rounded-full bg-white/30 mr-[1vh] shrink-0"></div>
                    <p class="font-mono list-tag text-white/50 uppercase truncate">TL // ${tlFirst}</p>
                </div>`;
            }
            if (rmFirst !== 'N/A') {
                listTagsHtml += `
                <div class="flex items-center">
                    <div class="w-[0.8vh] h-[0.8vh] rounded-full bg-accent-gold/50 mr-[1vh] shrink-0"></div>
                    <p class="font-mono list-tag text-accent-gold/70 uppercase truncate">MGR // ${rmFirst}</p>
                </div>`;
            }
                
            const fillPercentage = Math.max(3, (employee.sales / maxSalesBenchmark) * 100);

            let rankNumberStyle = ""; 
            let laserColor = "";
            let ringColor = "";
            
            if (rank === 2) {
                rankNumberStyle = "from-gray-100 to-gray-500";
                laserColor = "background: #E2E8F0;";
                ringColor = "border-gray-300/50";
            } else if (rank === 3) {
                rankNumberStyle = "from-orange-200 to-amber-700";
                laserColor = "background: #D97706;";
                ringColor = "border-amber-500/50";
            } else {
                rankNumberStyle = "from-cyan-200 to-blue-600";
                laserColor = "background: #00E5FF;";
                ringColor = "border-cyan-400/30";
            }

            return `
                <div class="flex-1 w-full glass-card flex flex-col justify-center px-[4vh] relative animate-tv-slide" style="animation-delay: ${(rank-1) * 0.15}s;">
                    <div class="flex items-center justify-between w-full z-10 relative h-full">
                        
                        <div class="flex items-center gap-[3vh] min-w-0 flex-1">
                            <!-- TV Sized Number -->
                            <div class="font-mono text-[7vh] font-bold w-[9vh] shrink-0 bg-clip-text text-transparent bg-gradient-to-b ${rankNumberStyle}">${String(rank).padStart(2, '0')}</div>
                            
                            <!-- Massive TV Avatar for 2-5 -->
                            <div class="w-[16vh] h-[16vh] rounded-full border-[0.4vh] ${ringColor} overflow-hidden shrink-0 relative p-[0.5vh] bg-[#050505]">
                                <div class="w-full h-full rounded-full overflow-hidden">
                                    ${photoHtml}
                                </div>
                            </div>
                            
                            <div class="flex flex-col min-w-0 pr-[2vh]">
                                <h3 class="font-sans list-name text-white truncate mb-[1vh]">${employee.name}</h3>
                                <div class="flex flex-col min-w-0">
                                    ${listTagsHtml}
                                </div>
                            </div>
                        </div>

                        <!-- TV Sized List Revenue -->
                        <div class="flex flex-col items-end shrink-0 pl-[2vh]">
                            <div class="font-mono list-rev text-white numeric-counter" data-target-value="${employee.sales}">
                                <span class="currency-symbol">₹</span>0
                            </div>
                        </div>
                    </div>

                    <div class="progress-line">
                        <div class="progress-line-fill" style="width: 0%; ${laserColor}" data-target-width="${fillPercentage}%"></div>
                    </div>
                </div>
            `;
        }

        async function fetchAndMergeData() {
            const cb = Date.now();
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([ fetch(photosUrl), fetch(salesUrl) ]);
                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        if (fullName && photoUrl) {
                            let cleanUrl = photoUrl;
                            const driveMatch = photoUrl.match(/(?:\/d\/|id=)([\w-]+)/);
                            if (driveMatch && driveMatch[1]) cleanUrl = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1200`;
                            
                            exactPhotoMap.set(fullName, cleanUrl);
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) firstNamePhotoMap.set(firstName, cleanUrl);
                        }
                    }
                });

                const mergedData = [];
                
                salesRaw.forEach((row) => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); 
                    const tl = (row[2] || '').toString().trim() || 'N/A'; 
                    const rm = (row[3] || '').toString().trim() || 'N/A'; 

                    let cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && name.toLowerCase() !== 'employee name') {
                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;
                        
                        mergedData.push({ name, sales: achieved, tl, rm, photo: matchedPhoto });
                    }
                });

                mergedData.sort((a, b) => b.sales - a.sales);
                return mergedData.slice(0, 5);

            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function renderLeaderboard(data) {
            if (!data || data.length === 0) return;

            const newDataHash = JSON.stringify(data);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            maxSalesBenchmark = data[0].sales;

            const heroSlot = document.getElementById('hero-slot');
            const contendersSlot = document.getElementById('contenders-slot');

            heroSlot.innerHTML = ''; 
            contendersSlot.innerHTML = '';

            if (data[0]) heroSlot.innerHTML = buildHeroCard(data[0]);
            
            for (let i = 1; i < 5; i++) {
                if (data[i]) contendersSlot.innerHTML += buildListCard(data[i], i + 1);
            }

            // Staggered Animations
            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 2500); 
                });

                document.querySelectorAll('.progress-line-fill').forEach((bar, index) => {
                    setTimeout(() => { bar.style.width = bar.getAttribute('data-target-width'); }, 300 + (index * 150));
                });
            }, 100);

            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => { loader.classList.add('hidden'); }, 500);
            }
        }

        async function updateDashboard() {
            try { renderLeaderboard(await fetchAndMergeData()); } 
            catch (err) { console.warn("Sync Issue:", err.message); }
        }

        // Screen Wake Lock API to prevent TV/Laptop from sleeping
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log("Wake Lock ignored by browser:", err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);
            
            // 1. ATTEMPT AUTOMATIC FULLSCREEN & KEEP-ALIVE (For Digital Signage TVs)
            setTimeout(() => {
                // Try to force Wake Lock and Heartbeat immediately
                requestWakeLock();
                initTvKeepAlive();
                
                // Try to force Fullscreen without a click
                try {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().then(() => {
                            const fsBtn = document.getElementById('fullscreen-btn');
                            if(fsBtn) fsBtn.classList.add('text-white', 'bg-white/10');
                        }).catch((err) => {
                            console.warn("Auto-fullscreen blocked by TV security. TV requires Kiosk mode or one initial click.", err.message);
                        });
                    }
                } catch(e) {}
            }, 2500); // 2.5 second delay allows the TV OS to finish loading the browser first

            // Keep TV screen active if it switches tabs and comes back
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') requestWakeLock();
            });

            // 2. FALLBACK: Re-acquire wake lock and trigger FULLSCREEN on first remote click anywhere (if auto fails)
            document.body.addEventListener('click', () => {
                requestWakeLock();
                initTvKeepAlive();
                
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    const fsBtn = document.getElementById('fullscreen-btn');
                    if(fsBtn) fsBtn.classList.add('text-white', 'bg-white/10');
                }
            });

            const fullscreenBtn = document.getElementById('fullscreen-btn');
            fullscreenBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent double-triggering with body click
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    fullscreenBtn.classList.add('text-white', 'bg-white/10');
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.classList.remove('text-white', 'bg-white/10');
                }
            });
        });
    </script>
</body>
</html>
