<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Viewport locked completely to prevent mobile scaling/zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Top 5 Performers - Market Research</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Adding Three.js for the 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        display: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: { bg: '#020617' }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'reveal': 'reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        reveal: {
                            '0%': { opacity: 0, transform: 'translateY(20px) scale(0.95)' },
                            '100%': { opacity: 1, transform: 'translateY(0) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ABSOLUTE 1-PAGE LOCK */
        :root {
            --safe-vh: 100vh;
        }
        
        body, html {
            background-color: #020617;
            color: #ffffff;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* STRICTLY NO SCROLLING */
            overscroll-behavior: none;
            display: flex;
            flex-direction: column;
            /* Support for mobile browser UI bars */
            height: -webkit-fill-available; 
        }

        /* 3D Canvas Background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Cinematic Overlay */
        .cinematic-vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 6, 23, 0.8) 100%);
            pointer-events: none;
        }

        /* Glassmorphism Cards - Dynamically Scaled based on Viewport Height */
        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Fluid Typography & Sizing - Scales perfectly on ANY screen */
        .fluid-name { font-size: clamp(0.7rem, 1.8vh, 1.5rem); }
        .fluid-num { font-size: clamp(1rem, 3.5vh, 3rem); line-height: 1; }
        .fluid-tag { font-size: clamp(0.4rem, 0.9vh, 0.8rem); }
        .fluid-avatar { 
            width: clamp(2.5rem, 8vh, 6rem); 
            height: clamp(2.5rem, 8vh, 6rem); 
        }
        
        .card-apex { 
            width: clamp(200px, 45vw, 400px); 
            padding: clamp(0.5rem, 2vh, 1.5rem);
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
        }
        .card-apex .fluid-avatar { width: clamp(3.5rem, 11vh, 8rem); height: clamp(3.5rem, 11vh, 8rem); }
        .card-apex .fluid-num { font-size: clamp(1.5rem, 5vh, 4.5rem); }

        .card-sub {
            width: clamp(140px, 35vw, 300px);
            padding: clamp(0.4rem, 1.5vh, 1.25rem);
        }

        /* Metallic Text */
        .text-gold { background: linear-gradient(to bottom right, #FFEAA7, #D4AF37, #997A15); -webkit-background-clip: text; color: transparent; }
        .text-silver { background: linear-gradient(to bottom right, #FFFFFF, #E2E8F0, #94A3B8); -webkit-background-clip: text; color: transparent; }
        .text-bronze { background: linear-gradient(to bottom right, #FDBA74, #D97706, #92400E); -webkit-background-clip: text; color: transparent; }

        /* Background Giant Numbers */
        .rank-bg {
            position: absolute;
            font-size: clamp(5rem, 20vh, 15rem);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            line-height: 1;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased selection:bg-cyan-900 selection:text-white">

    <!-- 3D Abstract Market/Data Background -->
    <canvas id="bg-canvas"></canvas>
    <div class="cinematic-vignette"></div>

    <!-- Full Screen Toggle -->
    <button id="fullscreen-btn" class="fixed top-2 right-2 md:top-4 md:right-4 z-50 bg-white/5 hover:bg-white/10 border border-white/10 backdrop-blur-md rounded-full p-2 text-white transition-all duration-300" title="Toggle Fullscreen">
        <svg class="w-4 h-4 md:w-5 md:h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
        </svg>
    </button>

    <!-- Main App Container - STRICTLY constrained -->
    <div class="flex flex-col h-full w-full relative z-10 px-2 py-2">
        
        <!-- Header (Takes exactly the space it needs, no more) -->
        <header class="flex-none flex flex-col items-center justify-center pt-2 pb-2 md:pt-4 md:pb-4 z-10">
            <!-- Frosted Glass Logo Badge -->
            <div class="bg-white/10 backdrop-blur-xl px-4 py-1.5 md:px-6 md:py-2 rounded-xl border border-white/20 inline-flex items-center justify-center mb-1 md:mb-2 shadow-lg">
                <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w800" 
                     alt="Company Logo" 
                     class="h-5 md:h-8 w-auto object-contain drop-shadow-md"
                     onerror="this.onerror=null; this.outerHTML='<h2 class=\\'text-sm md:text-lg font-black text-white tracking-widest uppercase\\'>COMPANY LOGO</h2>';">
            </div>

            <!-- Title -->
            <h1 class="font-display text-[clamp(1.2rem,3vh,3rem)] font-extrabold tracking-tight text-white mb-1 uppercase text-center drop-shadow-lg">
                Top 5 <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">Performers</span>
            </h1>
            
            <!-- Live Sync Indicator -->
            <div class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-md">
                <div class="relative flex h-1.5 w-1.5">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-cyan-500"></span>
                </div>
                <span class="text-slate-300 font-sans text-[8px] md:text-[10px] font-semibold tracking-widest uppercase">Live Sync</span>
            </div>
        </header>

        <!-- Main Pyramid Container (Flex-1 ensures it fills exactly remaining space) -->
        <main class="flex-1 w-full flex flex-col items-center justify-evenly z-10 pb-2 relative">
            
            <!-- Loading Screen -->
            <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-[#020617]/80 backdrop-blur-md transition-opacity duration-500 rounded-xl">
                <div class="relative w-8 h-8 md:w-12 md:h-12 mb-3">
                    <div class="absolute inset-0 border-2 border-slate-700 rounded-full"></div>
                    <div class="absolute inset-0 border-2 border-cyan-400 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <p id="loader-text" class="text-cyan-400 font-sans text-[10px] md:text-xs font-semibold tracking-[0.2em] uppercase">Authenticating Market Data...</p>
            </div>

            <!-- THE PYRAMID -->
            <!-- Gap dynamically scales with height. Flex-nowrap prevents breaking lines on thin phones -->
            <div id="leaderboard-container" class="w-full h-full flex flex-col items-center justify-evenly opacity-0 transition-opacity duration-700 overflow-visible">
                
                <!-- ROW 1: APEX (#1) -->
                <div id="row-1" class="flex-none flex justify-center w-full z-30 transform animate-float"></div>

                <!-- ROW 2: ELITE (#2, #3) -->
                <div id="row-2" class="flex-none flex flex-row justify-center items-center gap-2 md:gap-6 w-full z-20 flex-nowrap"></div>

                <!-- ROW 3: CONTENDERS (#4, #5) -->
                <div id="row-3" class="flex-none flex flex-row justify-center items-center gap-2 md:gap-6 w-full z-10 flex-nowrap"></div>
                
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // THREE.JS 3D BACKGROUND (Market Data Flow)
        // ==========================================
        function init3DBackground() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            
            // Camera setup
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 30);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Create a "Data Wave" terrain
            const geometry = new THREE.PlaneGeometry(100, 50, 60, 30);
            
            // Wireframe material with stock-market colors (Cyan/Emerald)
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x0891b2, // Cyan-600
                wireframe: true,
                transparent: true,
                opacity: 0.15
            });
            
            const plane = new THREE.Mesh(geometry, material);
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);

            // Add floating data particles
            const particlesGeo = new THREE.BufferGeometry();
            const particlesCount = 300;
            const posArray = new Float32Array(particlesCount * 3);
            
            for(let i = 0; i < particlesCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 80;
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const particlesMat = new THREE.PointsMaterial({
                size: 0.15,
                color: 0x10b981, // Emerald-500
                transparent: true,
                opacity: 0.4
            });
            const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particlesMesh);

            // Animation Loop
            let clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const elapsedTime = clock.getElapsedTime();

                // Make the plane wave like market charts
                const positions = plane.geometry.attributes.position.array;
                for(let i = 0; i < positions.length; i += 3) {
                    const x = positions[i];
                    const y = positions[i+1];
                    // Complex sine wave function for organic data flow look
                    positions[i+2] = Math.sin(x * 0.2 + elapsedTime * 0.5) * 2 + Math.cos(y * 0.2 + elapsedTime * 0.3) * 2;
                }
                plane.geometry.attributes.position.needsUpdate = true;
                
                // Slowly rotate particles
                particlesMesh.rotation.y = elapsedTime * 0.02;

                renderer.render(scene, camera);
            }
            animate();

            // Handle Resize perfectly
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.style.height = window.innerHeight + 'px'; // Mobile UI fix
            });
            
            // Initial mobile height fix
            document.body.style.height = window.innerHeight + 'px';
        }

        // Initialize 3D when window loads
        window.onload = function() {
            init3DBackground();
        };

        // ==========================================
        // DATA SYNC & UI ENGINE
        // ==========================================
        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 1500; 
        let previousDataHash = "";

        const container = document.getElementById('leaderboard-container');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');

        function parseCSV(text) {
            const result = []; let row = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        function formatImageUrl(url) {
            if (!url) return '';
            const driveMatch = url.match(/(?:\/d\/|id=)([\w-]+)/);
            if (driveMatch && driveMatch[1]) {
                return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
            }
            return url;
        }

        function formatRupees(num) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            }).format(num);
        }

        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        async function fetchAndMergeData() {
            const cb = Date.now();
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([ fetch(photosUrl), fetch(salesUrl) ]);
                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    // Look for name in Col A (0), photo in Col G (6)
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        if (fullName && photoUrl) {
                            const formattedUrl = formatImageUrl(photoUrl);
                            exactPhotoMap.set(fullName, formattedUrl);
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) {
                                firstNamePhotoMap.set(firstName, formattedUrl);
                            }
                        }
                    }
                });

                const mergedData = [];
                
                salesRaw.forEach((row, index) => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); 
                    const tl = (row[2] || '').toString().trim() || 'N/A'; 
                    const rm = (row[3] || '').toString().trim() || 'N/A'; 

                    const cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && achieved > 0) {
                        // Skip header intelligently
                        if(name.toLowerCase().includes('employee name') || index === 0 && isNaN(parseFloat(rawSalesStr))) return;

                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;

                        mergedData.push({ name, sales: achieved, tl, rm, photo: matchedPhoto });
                    }
                });

                mergedData.sort((a, b) => b.sales - a.sales);
                return mergedData.slice(0, 5);

            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function buildCard(employee, rank) {
            let config = {
                cardClass: 'card-sub',
                textColorClass: 'text-white', 
                ringClass: 'border-white/10',
                watermark: `0${rank}`, 
                crown: ''
            };
            
            if (rank === 1) {
                config.cardClass = 'card-apex';
                config.textColorClass = 'text-gold';
                config.ringClass = 'border-[#D4AF37] shadow-[0_0_20px_rgba(212,175,55,0.5)]';
                config.crown = `
                    <div class="absolute -top-[5%] z-20">
                        <svg class="w-[clamp(1.5rem,5vh,3rem)] h-[clamp(1.5rem,5vh,3rem)] text-[#D4AF37] drop-shadow-[0_0_15px_rgba(212,175,55,0.8)]" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/>
                        </svg>
                    </div>`;
            } else if (rank === 2) {
                config.textColorClass = 'text-silver';
            } else if (rank === 3) {
                config.textColorClass = 'text-bronze';
            }

            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" alt="${employee.name}" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center bg-slate-800 text-slate-300 font-display font-black text-xl">${initial}</div>`;

            // Smart Badges - Highly compact
            let managerTagsHtml = '';
            const tlClean = (employee.tl || '').toLowerCase().trim();
            const rmClean = (employee.rm || '').toLowerCase().trim();

            if (tlClean === rmClean || tlClean === '' || tlClean === 'n/a') {
                const displayName = employee.rm !== 'n/a' ? employee.rm : (employee.tl !== 'n/a' ? employee.tl : 'Unassigned');
                managerTagsHtml = `
                    <div class="inline-flex flex-col items-center justify-center bg-white/5 rounded border border-white/10 px-1 py-0.5 w-full">
                        <span class="fluid-tag text-slate-400 font-sans font-bold uppercase tracking-widest leading-none mb-0.5">Manager</span>
                        <span class="fluid-tag text-slate-200 font-display font-medium truncate w-full text-center leading-none">${displayName}</span>
                    </div>`;
            } else {
                managerTagsHtml = `
                    <div class="flex flex-row items-center justify-center gap-1 w-full">
                        <div class="inline-flex flex-col items-center justify-center bg-white/5 rounded border border-white/10 px-1 py-0.5 flex-1 overflow-hidden">
                            <span class="fluid-tag text-slate-400 font-sans font-bold uppercase tracking-widest leading-none mb-0.5">Lead</span>
                            <span class="fluid-tag text-cyan-200/90 font-display font-medium truncate w-full text-center leading-none">${employee.tl}</span>
                        </div>
                        <div class="inline-flex flex-col items-center justify-center bg-white/5 rounded border border-white/10 px-1 py-0.5 flex-1 overflow-hidden">
                            <span class="fluid-tag text-slate-400 font-sans font-bold uppercase tracking-widest leading-none mb-0.5">Mgr</span>
                            <span class="fluid-tag text-emerald-200/90 font-display font-medium truncate w-full text-center leading-none">${employee.rm}</span>
                        </div>
                    </div>`;
            }

            return `
                <div class="glass-card rounded-2xl ${config.cardClass} opacity-0 animate-reveal" style="animation-delay: ${rank * 0.1}s;">
                    <div class="rank-bg ${config.textColorClass}">${config.watermark}</div>
                    ${config.crown}
                    
                    <div class="relative z-10 fluid-avatar rounded-full overflow-hidden border-2 ${config.ringClass} flex-shrink-0 bg-[#0a0a0c] mb-1 p-0.5">
                        <div class="w-full h-full rounded-full overflow-hidden">
                            ${photoHtml}
                        </div>
                    </div>
                    
                    <h2 class="relative z-10 font-display fluid-name font-bold text-white text-center w-full tracking-tight truncate mb-1">
                        ${employee.name}
                    </h2>
                    
                    <div class="relative z-10 w-full mb-1.5 flex justify-center px-1">
                        ${managerTagsHtml}
                    </div>
                    
                    <div class="relative z-10 flex flex-col items-center w-full">
                        <div class="fluid-tag text-slate-400 font-sans font-bold mb-0.5 uppercase tracking-widest">Revenue</div>
                        <div class="font-display fluid-num font-extrabold ${config.textColorClass} tracking-tighter numeric-counter" data-target-value="${employee.sales}">
                            ₹0
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard(data) {
            if (!data || data.length === 0) return;

            const newDataHash = JSON.stringify(data);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            const r1 = document.getElementById('row-1');
            const r2 = document.getElementById('row-2');
            const r3 = document.getElementById('row-3');

            r1.innerHTML = ''; r2.innerHTML = ''; r3.innerHTML = '';

            if (data[0]) r1.innerHTML += buildCard(data[0], 1);
            if (data[1]) r2.innerHTML += buildCard(data[1], 2);
            if (data[2]) r2.innerHTML += buildCard(data[2], 3);
            if (data[3]) r3.innerHTML += buildCard(data[3], 4);
            if (data[4]) r3.innerHTML += buildCard(data[4], 5);

            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 2000); 
                });
            }, 50);

            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => {
                    loader.classList.add('hidden');
                    container.classList.remove('opacity-0');
                }, 500);
            }
        }

        async function updateDashboard() {
            try {
                const data = await fetchAndMergeData();
                renderLeaderboard(data);
            } catch (err) {
                console.warn("Sync Issue:", err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);

            // Fullscreen Logic
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                } else {
                    document.exitFullscreen();
                }
            });
        });
    </script>
</body>
</html>
