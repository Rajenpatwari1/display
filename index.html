<html lang="en">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        display: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            bg: '#030305',
                            cardBg: 'rgba(20, 20, 22, 0.4)',
                        }
                    },
                    animation: {
                        'float-slow': 'float 8s ease-in-out infinite',
                        'float-med': 'float 6s ease-in-out 1s infinite',
                        'reveal-up': 'revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
                        'light-sweep': 'lightSweep 8s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-6px)' },
                        },
                        revealUp: {
                            '0%': { opacity: 0, transform: 'translateY(30px) scale(0.95)' },
                            '100%': { opacity: 1, transform: 'translateY(0) scale(1)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 0.6, filter: 'brightness(1)' },
                            '50%': { opacity: 1, filter: 'brightness(1.3)' },
                        },
                        lightSweep: {
                            '0%': { backgroundPosition: '200% center' },
                            '100%': { backgroundPosition: '-200% center' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* PERFECT 1-PAGE FIT CSS */
        body {
            background-color: #030305;
            color: #ffffff;
            height: 100dvh; /* Dynamic Viewport Height - Fixes mobile address bar issues */
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* STRICTLY disables all scrolling */
            margin: 0;
            padding: 0;
            overscroll-behavior: none; /* Prevents mobile pull-to-refresh bounce */
        }

        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        .premium-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #030305;
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            pointer-events: none;
        }

        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: orbDrift 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-gold { width: 60vw; height: 60vw; background: rgba(184, 134, 11, 0.12); top: -20%; left: -10%; }
        .orb-cyan { width: 50vw; height: 50vw; background: rgba(8, 145, 178, 0.12); bottom: -10%; right: -10%; animation-delay: -5s; animation-duration: 25s; }
        .orb-emerald { width: 40vw; height: 40vw; background: rgba(16, 185, 129, 0.08); top: 30%; left: 30%; animation-delay: -10s; animation-duration: 30s; }

        @keyframes orbDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(3%, 5%) scale(1.05); }
        }

        /* Responsive Liquid Glass Cards */
        .architectural-glass {
            background: linear-gradient(145deg, rgba(30, 30, 35, 0.5) 0%, rgba(15, 15, 18, 0.7) 100%);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
            /* Flex-shrink allows cards to squash slightly on tiny phones */
            flex-shrink: 1;
        }

        .architectural-glass::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.02) 25%, transparent 30%);
            background-size: 200% 200%;
            animation: lightSweep 8s linear infinite;
            pointer-events: none;
        }

        /* Metallic Text */
        .text-metallic-gold { background: linear-gradient(to bottom right, #FFDF73, #D4AF37, #997A15); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .text-metallic-silver { background: linear-gradient(to bottom right, #FFFFFF, #E2E8F0, #94A3B8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .text-metallic-bronze { background: linear-gradient(to bottom right, #FDBA74, #D97706, #92400E); -webkit-background-clip: text; background-clip: text; color: transparent; }

        /* Dynamic Watermarks for Mobile vs Desktop */
        .premium-watermark {
            position: absolute;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 8rem; /* Scaled down for mobile safety */
            font-weight: 800;
            line-height: 1;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.04;
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.05em;
        }
        @media (min-width: 768px) {
            .premium-watermark { font-size: 14rem; }
        }

        /* Avatar Rings */
        .avatar-ring-gold { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); border: 2px solid rgba(212, 175, 55, 0.7); }
        .avatar-ring-silver { box-shadow: 0 0 15px rgba(226, 232, 240, 0.2); border: 2px solid rgba(226, 232, 240, 0.5); }
        .avatar-ring-bronze { box-shadow: 0 0 15px rgba(217, 119, 6, 0.2); border: 2px solid rgba(217, 119, 6, 0.5); }
        .avatar-ring-standard { border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="antialiased selection:bg-slate-700 selection:text-white">

    <div class="flex flex-col h-full w-full max-w-[1800px] mx-auto relative z-10 px-2 pb-2">

    <script>
        // Data Configuration
        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 1500; 
        let previousDataHash = "";

        const container = document.getElementById('leaderboard-container');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');

        // Robust CSV Parser
        function parseCSV(text) {
            const result = []; let row = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        // Format Image URL for Drive
        function formatImageUrl(url) {
            if (!url) return '';
            const driveMatch = url.match(/(?:\/d\/|id=)([\w-]+)/);
            if (driveMatch && driveMatch[1]) {
                return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
            }
            return url;
        }

        // Format INR Currency
        function formatRupees(num) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            }).format(num);
        }

        // Animation Counter Engine
        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        async function fetchAndMergeData() {
            const cb = Date.now();
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([ fetch(photosUrl), fetch(salesUrl) ]);
                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                // Smart Fuzzy Matching Maps
                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        if (fullName && photoUrl) {
                            const formattedUrl = formatImageUrl(photoUrl);
                            exactPhotoMap.set(fullName, formattedUrl);
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) {
                                firstNamePhotoMap.set(firstName, formattedUrl);
                            }
                        }
                    }
                });

                const mergedData = [];
                
                // Aggressive Data Cleaning for Sales Data
                salesRaw.forEach(row => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); // Column B: Revenue
                    const tl = (row[2] || '').toString().trim() || 'N/A'; // Column C: TL
                    const rm = (row[3] || '').toString().trim() || 'N/A'; // Column D: RM

                    // ULTRA CLEANER: Destroys all formatting, commas, text, spaces
                    const cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && achieved > 0 && !name.toLowerCase().includes('employee name')) {
                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;

                        mergedData.push({ name, sales: achieved, tl, rm, photo: matchedPhoto });
                    }
                });

                // Mathematically sort Top 5
                mergedData.sort((a, b) => b.sales - a.sales);
                return mergedData.slice(0, 5);

            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function buildCard(employee, rank) {
            // Highly responsive base classes (Shrinks dramatically on mobile)
            let config = {
                textColorClass: 'text-white', 
                ringClass: 'avatar-ring-standard',
                // Size mapping: Mobile -> Tablet -> Desktop
                avatarSize: 'w-10 h-10 md:w-12 md:h-12 lg:w-16 lg:h-16', 
                extraClasses: 'opacity-95', 
                watermark: `0${rank}`, 
                crown: '',
                // Width is bounded by viewport percentage on mobile
                cardSize: 'w-[46vw] max-w-[200px] md:max-w-none md:w-[240px] lg:w-[280px] p-2 md:p-4 lg:p-5',
                numberSize: 'text-sm md:text-xl lg:text-3xl',
                nameSize: 'text-xs md:text-base lg:text-xl'
            };
            
            // #1 APEX Card
            if (rank === 1) {
                config.textColorClass = 'text-metallic-gold';
                config.ringClass = 'avatar-ring-gold';
                config.avatarSize = 'w-14 h-14 md:w-20 md:h-20 lg:w-28 lg:h-28';
                config.extraClasses = 'transform z-30 mx-auto animate-float-slow';
                config.cardSize = 'w-[75vw] max-w-[300px] md:max-w-none md:w-[320px] lg:w-[380px] p-3 md:p-5 lg:p-6';
                config.numberSize = 'text-xl md:text-3xl lg:text-5xl';
                config.nameSize = 'text-sm md:text-xl lg:text-2xl';
                config.crown = `
                    <div class="absolute -top-6 md:-top-10 z-20 animate-pulse-glow">
                        <svg class="w-8 h-8 md:w-12 md:h-12 lg:w-16 lg:h-16 text-[#D4AF37] drop-shadow-[0_0_15px_rgba(212,175,55,0.6)]" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/>
                        </svg>
                    </div>`;
            } 
            // #2 & #3 ELITE Cards
            else if (rank === 2 || rank === 3) {
                config.textColorClass = rank === 2 ? 'text-metallic-silver' : 'text-metallic-bronze';
                config.ringClass = rank === 2 ? 'avatar-ring-silver' : 'avatar-ring-bronze';
                config.extraClasses = 'z-20 animate-float-med';
                config.numberSize = 'text-base md:text-2xl lg:text-3xl';
            }

            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" alt="${employee.name}" onerror="this.onerror=null;this.parentNode.innerHTML='<div class=\\'w-full h-full flex items-center justify-center bg-slate-800 text-slate-300 text-base md:text-2xl font-display font-black\\'>${initial}</div>';" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center bg-slate-800 text-slate-300 text-base md:text-2xl font-display font-black">${initial}</div>`;

            // Smart Manager Tags - Scaled for micro-displays
            let managerTagsHtml = '';
            const tlClean = (employee.tl || '').toLowerCase().trim();
            const rmClean = (employee.rm || '').toLowerCase().trim();

            if (tlClean === rmClean || tlClean === '' || tlClean === 'n/a') {
                const displayName = employee.rm !== 'n/a' ? employee.rm : (employee.tl !== 'n/a' ? employee.tl : 'Unassigned');
                managerTagsHtml = `
                    <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-lg border border-white/[0.05] px-2 py-1 md:px-4 md:py-2 backdrop-blur-sm w-full max-w-[140px]">
                        <span class="text-[6px] md:text-[8px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5">Manager</span>
                        <span class="text-[8px] md:text-[11px] text-slate-200 font-display font-medium truncate w-full text-center">${displayName}</span>
                    </div>`;
            } else {
                managerTagsHtml = `
                    <div class="flex flex-row items-center justify-center gap-1 md:gap-2 w-full">
                        <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-lg border border-white/[0.05] px-1 py-1 md:px-2 md:py-1.5 backdrop-blur-sm flex-1 overflow-hidden">
                            <span class="text-[5px] md:text-[7px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5 truncate w-full text-center">Lead</span>
                            <span class="text-[7px] md:text-[10px] text-cyan-200/90 font-display font-medium truncate w-full text-center">${employee.tl}</span>
                        </div>
                        <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-lg border border-white/[0.05] px-1 py-1 md:px-2 md:py-1.5 backdrop-blur-sm flex-1 overflow-hidden">
                            <span class="text-[5px] md:text-[7px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5 truncate w-full text-center">Mgr</span>
                            <span class="text-[7px] md:text-[10px] text-emerald-200/90 font-display font-medium truncate w-full text-center">${employee.rm}</span>
                        </div>
                    </div>`;
            }

            return `
                <div class="architectural-glass flex flex-col items-center rounded-2xl md:rounded-[2rem] ${config.cardSize} ${config.extraClasses} animate-reveal-up" style="animation-delay: ${rank * 0.1}s;">
                    <div class="premium-watermark text-white">${config.watermark}</div>
                    ${config.crown}
                    
                    <div class="relative z-10 ${config.avatarSize} rounded-full overflow-hidden ${config.ringClass} flex-shrink-0 bg-[#0a0a0c] mb-1 md:mb-3 shadow-2xl p-0.5 md:p-1">
                        <div class="w-full h-full rounded-full overflow-hidden">
                            ${photoHtml}
                        </div>
                    </div>
                    
                    <h2 class="relative z-10 font-display ${config.nameSize} font-bold text-white text-center w-full tracking-tight truncate mb-1 md:mb-3 drop-shadow-md">
                        ${employee.name}
                    </h2>
                    
                    <div class="relative z-10 w-full mb-2 md:mb-4 flex justify-center px-1">
                        ${managerTagsHtml}
                    </div>
                    
                    <div class="w-3/4 h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent mb-1 md:mb-3 relative z-10"></div>
                    
                    <div class="relative z-10 flex flex-col items-center w-full">
                        <div class="text-[6px] md:text-[9px] text-slate-500 font-sans font-bold mb-0.5 md:mb-1 uppercase tracking-[0.2em] md:tracking-[0.25em]">Revenue Achieved</div>
                        <div class="font-display ${config.numberSize} font-extrabold ${config.textColorClass} tracking-tighter numeric-counter" data-target-value="${employee.sales}">
                            ₹0
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard(data) {
            if (!data || data.length === 0) {
                loaderText.innerText = "Waiting for data...";
                return;
            }

            const newDataHash = JSON.stringify(data);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            const r1 = document.getElementById('row-1');
            const r2 = document.getElementById('row-2');
            const r3 = document.getElementById('row-3');

            r1.innerHTML = ''; r2.innerHTML = ''; r3.innerHTML = '';

            if (data[0]) r1.innerHTML += buildCard(data[0], 1);
            if (data[1]) r2.innerHTML += buildCard(data[1], 2);
            if (data[2]) r2.innerHTML += buildCard(data[2], 3);
            if (data[3]) r3.innerHTML += buildCard(data[3], 4);
            if (data[4]) r3.innerHTML += buildCard(data[4], 5);

            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 2500); 
                });
            }, 50);

            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => {
                    loader.classList.add('hidden');
                    container.classList.remove('opacity-0');
                }, 500);
            }
        }

        async function updateDashboard() {
            try {
                const data = await fetchAndMergeData();
                renderLeaderboard(data);
            } catch (err) {
                console.warn("Sync Issue:", err.message);
                if(loaderText && !loader.classList.contains('hidden')) {
                    loaderText.innerText = "Error syncing data. Retrying...";
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);

            // Fullscreen Button
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {
                        console.warn('Fullscreen denied by browser.');
                    });
                } else {
                    document.exitFullscreen();
                }
            });
        });
    </script>
</body>
</html>
