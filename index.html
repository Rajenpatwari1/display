<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Sales Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Premium Silicon Valley Typography: Outfit for UI, Space Grotesk for Data/Numbers -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Outfit"', 'sans-serif'],
                        mono: ['"Space Grotesk"', 'monospace'],
                    },
                    colors: {
                        'obsidian': '#030303',
                        'glass-panel': 'rgba(255, 255, 255, 0.03)',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                        'accent-gold': '#F4D06F',
                        'accent-blue': '#40C4FF',
                        'text-muted': '#8A8F98'
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-left': 'slideLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'spin-slow': 'spin 12s linear infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: 0, transform: 'scale(0.95)' }, '100%': { opacity: 1, transform: 'scale(1)' } },
                        slideLeft: { '0%': { opacity: 0, transform: 'translateX(40px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } }
                    }
                }
            }
        }
    </script>

    <style>
        /* ABSOLUTE 1-PAGE LOCK - NO SCROLLING */
        body, html {
            background-color: #030303;
            color: #ffffff;
            height: 100vh; height: 100dvh;
            width: 100%;
            margin: 0; padding: 0;
            overflow: hidden; 
            overscroll-behavior: none;
        }

        /* 7D Animated Aurora Background (Meta/Google Style) */
        .aurora-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background: #030303;
        }
        .aurora-blob {
            position: absolute; border-radius: 50%;
            filter: blur(100px); opacity: 0.6;
            animation: float-aurora 25s infinite alternate ease-in-out;
            will-change: transform;
        }
        .blob-1 { top: -15%; left: -10%; width: 55vw; height: 55vw; background: rgba(64, 196, 255, 0.4); animation-delay: 0s; } /* Google Blue */
        .blob-2 { bottom: -20%; right: -10%; width: 65vw; height: 65vw; background: rgba(144, 97, 255, 0.35); animation-delay: -5s; } /* Meta Purple */
        .blob-3 { top: 35%; left: 30%; width: 45vw; height: 45vw; background: rgba(244, 208, 111, 0.15); animation-delay: -10s; } /* Accent Gold */

        @keyframes float-aurora {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(8vw, -8vh) scale(1.15) rotate(45deg); }
            66% { transform: translate(-8vw, 12vh) scale(0.9) rotate(-20deg); }
            100% { transform: translate(4vw, 4vh) scale(1.1) rotate(10deg); }
        }

        /* Micro-noise texture for that expensive, matte finish */
        .noise-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Premium Glass Panels */
        .glass-card {
            background: var(--tw-colors-glass-panel);
            border: 1px solid var(--tw-colors-glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* The Hero Avatar Ring */
        .hero-ring {
            position: absolute; inset: -4px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 40%, var(--tw-colors-accent-gold) 100%);
            animation: spin-slow 8s linear infinite;
        }

        /* Fluid Typography strictly locked to Viewport Height to prevent wrapping */
        .title-text { font-size: clamp(1.2rem, 2.5vh, 2rem); letter-spacing: 0.15em; }
        .hero-name { font-size: clamp(2.5rem, 5vh, 4.5rem); line-height: 1.1; letter-spacing: -0.02em; }
        .hero-rev { font-size: clamp(4rem, 8vh, 7rem); line-height: 1; letter-spacing: -0.04em; }
        
        .list-name { font-size: clamp(1.2rem, 2.5vh, 1.8rem); line-height: 1.2; letter-spacing: -0.01em; }
        .list-rev { font-size: clamp(1.8rem, 3.5vh, 2.8rem); line-height: 1; letter-spacing: -0.03em; }

        .currency-symbol { font-family: 'Outfit', sans-serif; font-weight: 300; opacity: 0.5; margin-right: 4px; font-size: 0.6em; }
        
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* The thin, sleek progress line */
        .progress-line { height: 2px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: auto; }
        .progress-line-fill { height: 100%; background: var(--tw-colors-accent-blue); border-radius: 2px; transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 0 10px var(--tw-colors-accent-blue); }
    </style>
</head>
<body class="antialiased text-white selection:bg-accent-blue selection:text-black flex flex-col p-4 md:p-6 lg:p-8 gap-4 md:gap-6">

    <!-- 7D Aurora Background -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>

    <div class="noise-overlay"></div>

    <!-- HEADER -->
    <header class="flex-none flex justify-between items-center z-10 h-[5vh] min-h-[40px]">
        <!-- Left: Logo -->
        <div class="flex items-center">
            <div class="bg-white/5 border border-white/10 px-5 py-2 rounded-lg flex items-center justify-center backdrop-blur-md">
                <!-- Using Thumbnail API for reliable Google Drive loading -->
                <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w400" 
                     alt="Logo" class="h-6 w-auto object-contain"
                     onerror="this.onerror=null; this.outerHTML='<h2 class=\\'text-xs font-bold text-white tracking-[0.2em] uppercase\\'>COMPANY LOGO</h2>';">
            </div>
        </div>

        <!-- Center: Title -->
        <div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-4">
            <div class="w-2 h-2 rounded-full bg-accent-gold animate-pulse"></div>
            <h1 class="font-sans title-text font-semibold uppercase text-white/90">Top 5 Performers</h1>
            <div class="w-2 h-2 rounded-full bg-accent-gold animate-pulse"></div>
        </div>

        <!-- Right: Time & Fullscreen -->
        <div class="flex items-center gap-4">
            <div id="live-clock" class="font-mono text-sm text-text-muted">00:00:00</div>
            <button id="fullscreen-btn" class="text-text-muted hover:text-white transition-colors p-2 rounded-lg hover:bg-white/5 border border-transparent">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>
    </header>

    <!-- MAIN SPLIT SCREEN -->
    <main class="flex-1 w-full relative z-10 flex flex-col lg:flex-row gap-6 lg:gap-8 h-[calc(100%-5vh-24px)]">
        
        <!-- Loading Overlay -->
        <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-obsidian/90 backdrop-blur-sm transition-opacity duration-500 rounded-3xl border border-white/5">
            <div class="w-10 h-10 border-2 border-white/10 border-t-accent-gold rounded-full animate-spin mb-4"></div>
            <p class="font-sans text-xs tracking-widest text-text-muted uppercase">Syncing Live Data...</p>
        </div>

        <!-- LEFT PANEL: The Hero (#1) -->
        <div class="w-full lg:w-5/12 h-full glass-card flex flex-col items-center justify-center p-8 text-center" id="hero-slot">
            <!-- Injected via JS -->
        </div>

        <!-- RIGHT PANEL: The List (#2 to #5) -->
        <div class="w-full lg:w-7/12 h-full flex flex-col gap-4" id="contenders-slot">
            <!-- Injected via JS -->
        </div>
        
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-IN', { hour12: false });
        }, 1000);

        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 1500; 
        let previousDataHash = "";
        let maxSalesBenchmark = 1; 

        const loader = document.getElementById('loader');

        // Robust CSV Parser
        function parseCSV(text) {
            const result = []; let row = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        function formatRupees(num) {
            const formatted = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 }).format(num);
            return `<span class="currency-symbol">₹</span>${formatted}`;
        }

        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 5); 
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        function buildHeroCard(employee) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full relative z-10 bg-obsidian">`
                : `<div class="w-full h-full rounded-full relative z-10 bg-zinc-900 border border-white/10 flex items-center justify-center text-text-muted text-6xl font-sans">${initial}</div>`;

            // Smart Manager Badge
            let managerTag = '';
            if (employee.tl === employee.rm) {
                managerTag = `MANAGER: ${employee.tl}`;
            } else {
                managerTag = `TL: ${employee.tl} &nbsp;|&nbsp; RM: ${employee.rm}`;
            }

            return `
                <div class="w-full h-full flex flex-col items-center justify-center animate-fade-in relative">
                    <!-- Subtle Rank Background Watermark -->
                    <div class="absolute inset-0 flex items-center justify-center z-0 opacity-[0.02] pointer-events-none">
                        <span class="font-mono text-[40vh] font-bold leading-none">1</span>
                    </div>

                    <div class="z-10 flex flex-col items-center w-full">
                        <span class="text-accent-gold font-sans text-[10px] md:text-xs font-bold tracking-[0.3em] uppercase mb-6 md:mb-8 border border-accent-gold/30 bg-accent-gold/5 px-4 py-1.5 rounded-full shadow-[0_0_15px_rgba(244,208,111,0.2)]">Rank One</span>
                        
                        <div class="relative w-[20vh] h-[20vh] md:w-[25vh] md:h-[25vh] rounded-full p-1.5 mb-6 md:mb-8 shadow-[0_0_50px_rgba(244,208,111,0.15)]">
                            <div class="hero-ring"></div>
                            ${photoHtml}
                        </div>

                        <h2 class="font-sans font-semibold hero-name text-white mb-3 w-full px-4 truncate">${employee.name}</h2>
                        <div class="font-mono text-xs md:text-sm text-text-muted tracking-widest uppercase mb-8 md:mb-12 bg-white/5 px-4 py-2 rounded-lg border border-white/5">${managerTag}</div>
                        
                        <div class="w-full">
                            <div class="font-mono font-bold hero-rev text-white numeric-counter drop-shadow-[0_0_20px_rgba(255,255,255,0.2)]" data-target-value="${employee.sales}">
                                <span class="currency-symbol">₹</span>0
                            </div>
                            <div class="mt-2 text-text-muted font-sans text-sm tracking-widest uppercase">Revenue Achieved</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildListCard(employee, rank) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full">`
                : `<div class="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-text-muted text-xl font-sans">${initial}</div>`;

            let managerTag = '';
            if (employee.tl === employee.rm) {
                managerTag = `MGR: ${employee.tl}`;
            } else {
                managerTag = `TL: ${employee.tl} &nbsp;&bull;&nbsp; RM: ${employee.rm}`;
            }

            const fillPercentage = Math.max(2, (employee.sales / maxSalesBenchmark) * 100);

            return `
                <div class="flex-1 w-full glass-card flex flex-col justify-center px-6 md:px-8 relative animate-slide-left" style="animation-delay: ${(rank-1) * 0.1}s;">
                    <div class="flex items-center justify-between w-full z-10 mb-2">
                        
                        <!-- Left Side: Rank, Avatar, Info -->
                        <div class="flex items-center gap-6 min-w-0 flex-1">
                            <div class="font-mono text-2xl md:text-3xl font-bold text-white/20 w-8 md:w-12 shrink-0">0${rank}</div>
                            
                            <div class="w-[7vh] h-[7vh] min-w-[40px] min-h-[40px] rounded-full border border-white/10 overflow-hidden shrink-0">
                                ${photoHtml}
                            </div>
                            
                            <div class="flex flex-col min-w-0 pr-4">
                                <h3 class="font-sans font-semibold list-name text-white/90 truncate">${employee.name}</h3>
                                <p class="font-mono text-[10px] md:text-xs text-text-muted uppercase tracking-wider truncate mt-1">${managerTag}</p>
                            </div>
                        </div>

                        <!-- Right Side: Revenue -->
                        <div class="flex flex-col items-end shrink-0 pl-4">
                            <div class="font-mono font-bold list-rev text-white numeric-counter" data-target-value="${employee.sales}">
                                <span class="currency-symbol">₹</span>0
                            </div>
                        </div>
                        
                    </div>

                    <!-- Bottom Progress Line -->
                    <div class="progress-line w-full absolute bottom-0 left-0">
                        <div class="progress-line-fill" style="width: 0%;" data-target-width="${fillPercentage}%"></div>
                    </div>
                </div>
            `;
        }

        async function fetchAndMergeData() {
            const cb = Date.now();
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([ fetch(photosUrl), fetch(salesUrl) ]);
                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        if (fullName && photoUrl) {
                            let cleanUrl = photoUrl;
                            const driveMatch = photoUrl.match(/(?:\/d\/|id=)([\w-]+)/);
                            if (driveMatch && driveMatch[1]) cleanUrl = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
                            
                            exactPhotoMap.set(fullName, cleanUrl);
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) firstNamePhotoMap.set(firstName, cleanUrl);
                        }
                    }
                });

                const mergedData = [];
                
                salesRaw.forEach((row) => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); 
                    const tl = (row[2] || '').toString().trim() || 'N/A'; 
                    const rm = (row[3] || '').toString().trim() || 'N/A'; 

                    let cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && name.toLowerCase() !== 'employee name') {
                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;
                        
                        mergedData.push({ name, sales: achieved, tl, rm, photo: matchedPhoto });
                    }
                });

                mergedData.sort((a, b) => b.sales - a.sales);
                return mergedData.slice(0, 5);

            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function renderLeaderboard(data) {
            if (!data || data.length === 0) return;

            const newDataHash = JSON.stringify(data);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            maxSalesBenchmark = data[0].sales;

            const heroSlot = document.getElementById('hero-slot');
            const contendersSlot = document.getElementById('contenders-slot');

            heroSlot.innerHTML = ''; 
            contendersSlot.innerHTML = '';

            if (data[0]) heroSlot.innerHTML = buildHeroCard(data[0]);
            
            for (let i = 1; i < 5; i++) {
                if (data[i]) contendersSlot.innerHTML += buildListCard(data[i], i + 1);
            }

            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 2500); 
                });

                document.querySelectorAll('.progress-line-fill').forEach(bar => {
                    setTimeout(() => { bar.style.width = bar.getAttribute('data-target-width'); }, 300);
                });
            }, 50);

            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => { loader.classList.add('hidden'); }, 500);
            }
        }

        async function updateDashboard() {
            try { renderLeaderboard(await fetchAndMergeData()); } 
            catch (err) { console.warn("Sync Issue:", err.message); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);

            const fullscreenBtn = document.getElementById('fullscreen-btn');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    fullscreenBtn.classList.add('text-white', 'bg-white/5');
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.classList.remove('text-white', 'bg-white/5');
                }
            });
        });
    </script>
</body>
</html>
