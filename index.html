<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Sales Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Premium Silicon Valley Typography: Outfit for UI, Space Grotesk for Data/Numbers -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Outfit"', 'sans-serif'],
                        mono: ['"Space Grotesk"', 'monospace'],
                    },
                    colors: {
                        'obsidian': '#030303',
                        'glass-panel': 'rgba(20, 20, 20, 0.4)',
                        'glass-border': 'rgba(255, 255, 255, 0.08)',
                        'accent-gold': '#F4D06F',
                        'accent-silver': '#E2E8F0',
                        'accent-bronze': '#D97706',
                        'accent-cyan': '#00E5FF',
                        'text-muted': '#8A8F98'
                    },
                    animation: {
                        'blur-fade': 'blurFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-left': 'slideLeftBlur 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'spin-slow': 'spin 15s linear infinite',
                        'spin-slow-reverse': 'spin 10s linear infinite reverse',
                        'float': 'floating 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blurFade: { 
                            '0%': { opacity: 0, filter: 'blur(15px)', transform: 'scale(0.95) translateY(20px)' }, 
                            '100%': { opacity: 1, filter: 'blur(0)', transform: 'scale(1) translateY(0)' } 
                        },
                        slideLeftBlur: { 
                            '0%': { opacity: 0, filter: 'blur(10px)', transform: 'translateX(60px)' }, 
                            '100%': { opacity: 1, filter: 'blur(0)', transform: 'translateX(0)' } 
                        },
                        floating: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* ABSOLUTE 1-PAGE LOCK - NO SCROLLING */
        body, html {
            background-color: #000000;
            color: #ffffff;
            height: 100vh; height: 100dvh;
            width: 100%;
            margin: 0; padding: 0;
            overflow: hidden; 
            overscroll-behavior: none;
        }

        /* 7D Animated Aurora Background with Screen Blend Mode for extreme coolness */
        .aurora-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background: #050505;
        }
        .aurora-blob {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.5;
            mix-blend-mode: screen;
            animation: float-aurora 25s infinite alternate ease-in-out;
            will-change: transform;
        }
        .blob-1 { top: -15%; left: -10%; width: 60vw; height: 60vw; background: rgba(0, 229, 255, 0.25); animation-delay: 0s; } /* Cyan */
        .blob-2 { bottom: -20%; right: -10%; width: 70vw; height: 70vw; background: rgba(144, 97, 255, 0.2); animation-delay: -5s; } /* Purple */
        .blob-3 { top: 35%; left: 30%; width: 50vw; height: 50vw; background: rgba(244, 208, 111, 0.15); animation-delay: -10s; } /* Gold */
        .blob-4 { bottom: 10%; left: 10%; width: 40vw; height: 40vw; background: rgba(0, 255, 128, 0.15); animation-delay: -15s; } /* Emerald */

        @keyframes float-aurora {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(10vw, -10vh) scale(1.2) rotate(45deg); }
            66% { transform: translate(-10vw, 15vh) scale(0.8) rotate(-20deg); }
            100% { transform: translate(5vw, 5vh) scale(1.1) rotate(10deg); }
        }

        /* Microscopic Dot Matrix Grid over the Aurora */
        .cyber-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15;
            background-size: 30px 30px;
            background-image: radial-gradient(circle at center, #ffffff 1px, transparent 1px);
        }

        /* Ultra-Premium Glass Panels */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-top: 1px solid rgba(255,255,255,0.2); /* Edge lighting */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 24px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 10px rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }

        /* Holographic Hero Avatar Rings */
        .hero-ring-base { position: absolute; inset: -4px; border-radius: 50%; border: 1px solid rgba(244, 208, 111, 0.2); }
        .hero-ring-dash { position: absolute; inset: -12px; border-radius: 50%; border: 2px dashed rgba(244, 208, 111, 0.4); }
        .hero-ring-glow {
            position: absolute; inset: -20px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, transparent 70%, rgba(244,208,111,0.8) 100%);
            -webkit-mask: radial-gradient(transparent 68%, black 70%);
            mask: radial-gradient(transparent 68%, black 70%);
        }

        /* Fluid Typography */
        .title-text { font-size: clamp(1.2rem, 2.5vh, 2rem); letter-spacing: 0.2em; }
        .hero-name { font-size: clamp(2.5rem, 5vh, 4.5rem); line-height: 1.1; letter-spacing: -0.02em; }
        .hero-rev { font-size: clamp(4rem, 8vh, 7.5rem); line-height: 1; letter-spacing: -0.04em; }
        
        .list-name { font-size: clamp(1.2rem, 2.5vh, 2rem); line-height: 1.2; letter-spacing: -0.01em; }
        .list-rev { font-size: clamp(1.8rem, 3.5vh, 3rem); line-height: 1; letter-spacing: -0.03em; }

        .currency-symbol { font-family: 'Outfit', sans-serif; font-weight: 300; opacity: 0.5; margin-right: 4px; font-size: 0.6em; }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }

        /* The Neon Laser Progress Line */
        .progress-line { height: 3px; width: 100%; background: rgba(255,255,255,0.05); margin-top: auto; position: absolute; bottom: 0; left: 0;}
        .progress-line-fill { 
            height: 100%; border-radius: 0 4px 4px 0; 
            transition: width 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); 
            position: relative;
        }
        /* The glowing "Comet Head" of the laser */
        .progress-line-fill::after {
            content: ''; position: absolute; right: 0; top: -2px; bottom: -2px; width: 15px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 15px 3px inherit;
        }
    </style>
</head>
<body class="antialiased text-white selection:bg-accent-cyan selection:text-black flex flex-col p-4 md:p-6 lg:p-8 gap-4 md:gap-6">

    <!-- 7D Aurora Background & Cyber Grid -->
    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
        <div class="aurora-blob blob-4"></div>
    </div>
    <div class="cyber-grid"></div>

    <!-- HEADER -->
    <header class="flex-none flex justify-between items-center z-10 h-[5vh] min-h-[40px]">
        <!-- Left: Logo -->
        <div class="flex items-center w-1/3">
            <div class="bg-white/10 border border-white/20 px-5 py-2 rounded-xl flex items-center justify-center backdrop-blur-md shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                <!-- Using Thumbnail API for reliable Google Drive loading -->
                <img src="https://drive.google.com/thumbnail?id=16K2KHrjf4Rl9ZY2OTaeS0YSZK9klqwH4&sz=w400" 
                     alt="Logo" class="h-6 w-auto object-contain"
                     onerror="this.onerror=null; this.outerHTML='<h2 class=\\'text-xs font-bold text-white tracking-[0.2em] uppercase\\'>COMPANY LOGO</h2>';">
            </div>
        </div>

        <!-- Center: Title -->
        <div class="w-1/3 flex justify-center items-center gap-4">
            <div class="w-2 h-2 rounded-full bg-accent-cyan animate-pulse shadow-[0_0_10px_rgba(0,229,255,0.8)]"></div>
            <h1 class="font-sans title-text font-bold uppercase text-transparent bg-clip-text bg-gradient-to-r from-white to-white/50 tracking-widest drop-shadow-lg">TOP 5 PERFORMERS</h1>
            <div class="w-2 h-2 rounded-full bg-accent-cyan animate-pulse shadow-[0_0_10px_rgba(0,229,255,0.8)]"></div>
        </div>

        <!-- Right: Time & Fullscreen -->
        <div class="flex items-center justify-end w-1/3 gap-4">
            <div id="live-clock" class="font-mono text-sm text-text-muted bg-black/40 px-3 py-1 rounded-md border border-white/5">00:00:00</div>
            <button id="fullscreen-btn" class="text-text-muted hover:text-white transition-all p-2 rounded-lg hover:bg-white/10 border border-transparent hover:border-white/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
            </button>
        </div>
    </header>

    <!-- MAIN SPLIT SCREEN (Guaranteed 1-Page Fit) -->
    <main class="flex-1 w-full relative z-10 flex flex-col lg:flex-row gap-6 lg:gap-8 h-[calc(100%-5vh-24px)]">
        
        <!-- Loading Overlay -->
        <div id="loader" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-obsidian/80 backdrop-blur-md transition-opacity duration-500 rounded-3xl border border-white/10">
            <div class="relative w-16 h-16 flex items-center justify-center mb-4">
                <div class="absolute inset-0 border-2 border-white/10 border-t-accent-cyan rounded-full animate-spin"></div>
                <div class="absolute inset-2 border-2 border-white/10 border-b-accent-gold rounded-full animate-spin-reverse" style="animation-direction: reverse;"></div>
            </div>
            <p class="font-sans text-[10px] tracking-[0.3em] text-accent-cyan uppercase drop-shadow-[0_0_5px_rgba(0,229,255,0.5)]">Establishing Data Link...</p>
        </div>

        <!-- LEFT PANEL: The Hero (#1) -->
        <div class="w-full lg:w-[45%] h-full glass-card flex flex-col items-center justify-center p-8 text-center animate-blur-fade shadow-[0_0_50px_rgba(244,208,111,0.05)]" id="hero-slot">
            <!-- Injected via JS -->
        </div>

        <!-- RIGHT PANEL: The List (#2 to #5) - Strictly stacked to fill height -->
        <div class="w-full lg:w-[55%] h-full flex flex-col gap-4 lg:gap-5" id="contenders-slot">
            <!-- Injected via JS -->
        </div>
        
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-IN', { hour12: false });
        }, 1000);

        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 1500; 
        let previousDataHash = "";
        let maxSalesBenchmark = 1; 

        const loader = document.getElementById('loader');

        // Robust CSV Parser
        function parseCSV(text) {
            const result = []; let row = []; let inQuotes = false; let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        function formatRupees(num) {
            const formatted = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 }).format(num);
            return `<span class="currency-symbol">₹</span>${formatted}`;
        }

        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 5); 
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        function buildHeroCard(employee) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full relative z-10 bg-obsidian">`
                : `<div class="w-full h-full rounded-full relative z-10 bg-zinc-900 border border-white/10 flex items-center justify-center text-text-muted text-6xl font-sans">${initial}</div>`;

            const tlFirst = employee.tl.split(/\s+/)[0] || 'N/A';
            const rmFirst = employee.rm.split(/\s+/)[0] || 'N/A';
            
            // Stack the tags so the Manager always comes down on a new line
            let tagsHtml = "";
            if (employee.tl.toLowerCase() !== employee.name.toLowerCase() && employee.tl.toLowerCase() !== employee.rm.toLowerCase() && tlFirst !== 'N/A') {
                tagsHtml += `<div class="font-mono text-[10px] md:text-xs text-accent-cyan tracking-[0.2em] uppercase bg-accent-cyan/10 px-4 py-1.5 rounded border border-accent-cyan/20">TL: ${tlFirst}</div>`;
            }
            if (rmFirst !== 'N/A') {
                tagsHtml += `<div class="font-mono text-[10px] md:text-xs text-accent-gold tracking-[0.2em] uppercase bg-accent-gold/10 px-4 py-1.5 rounded border border-accent-gold/20">MGR: ${rmFirst}</div>`;
            }

            return `
                <div class="w-full h-full flex flex-col items-center justify-center relative animate-float">
                    <!-- Subtle Rank Watermark -->
                    <div class="absolute inset-0 flex items-center justify-center z-0 opacity-[0.03] pointer-events-none">
                        <span class="font-mono text-[50vh] font-bold leading-none bg-clip-text text-transparent bg-gradient-to-b from-white to-transparent">1</span>
                    </div>

                    <div class="z-10 flex flex-col items-center w-full">
                        
                        <!-- Futuristic Holographic Badge -->
                        <div class="flex items-center gap-3 border border-accent-gold/40 bg-accent-gold/5 px-6 py-2 rounded-full shadow-[0_0_20px_rgba(244,208,111,0.2)] backdrop-blur-xl mb-8">
                            <div class="w-2 h-2 bg-accent-gold rounded-full animate-pulse shadow-[0_0_8px_#F4D06F]"></div>
                            <span class="text-accent-gold font-sans text-[11px] md:text-sm font-bold tracking-[0.4em] uppercase">MVP // 01</span>
                            <div class="w-2 h-2 bg-accent-gold rounded-full animate-pulse shadow-[0_0_8px_#F4D06F]"></div>
                        </div>
                        
                        <!-- MASSIVE Holographic Avatar Array (Slightly larger to maintain hierarchy) -->
                        <div class="relative w-[32vh] h-[32vh] md:w-[38vh] md:h-[38vh] rounded-full p-2 mb-8 transition-transform hover:scale-105 duration-700">
                            <div class="hero-ring-glow animate-spin-slow"></div>
                            <div class="hero-ring-dash animate-spin-slow-reverse"></div>
                            <div class="hero-ring-base"></div>
                            <div class="w-full h-full rounded-full overflow-hidden shadow-[0_0_40px_rgba(244,208,111,0.15)] relative z-20 border border-white/5">
                                ${photoHtml}
                            </div>
                        </div>

                        <!-- Name & Tags -->
                        <h2 class="font-sans font-bold hero-name text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-100 to-gray-400 mb-4 w-full px-4 truncate drop-shadow-md">${employee.name}</h2>
                        
                        <!-- Cyberpunk Style HUD Tags (Stacked vertically) -->
                        <div class="flex flex-col items-center gap-2 mb-10 md:mb-12">
                            ${tagsHtml}
                        </div>
                        
                        <!-- Massive Golden Revenue -->
                        <div class="w-full relative">
                            <div class="absolute -inset-4 bg-accent-gold/20 blur-3xl rounded-full z-0 opacity-50"></div>
                            <div class="font-mono font-bold hero-rev text-transparent bg-clip-text bg-gradient-to-b from-[#F4D06F] to-[#d4a83e] numeric-counter relative z-10 drop-shadow-[0_0_15px_rgba(244,208,111,0.4)]" data-target-value="${employee.sales}">
                                <span class="currency-symbol text-[#F4D06F]">₹</span>0
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function buildListCard(employee, rank) {
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" class="avatar-img rounded-full">`
                : `<div class="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-white/30 text-2xl font-sans">${initial}</div>`;

            const tlFirst = employee.tl.split(/\s+/)[0] || 'N/A';
            const rmFirst = employee.rm.split(/\s+/)[0] || 'N/A';
            
            // Stack the tags for list view so Manager name comes down below TL
            let listTagsHtml = "";
            if (employee.tl.toLowerCase() !== employee.name.toLowerCase() && employee.tl.toLowerCase() !== employee.rm.toLowerCase() && tlFirst !== 'N/A') {
                listTagsHtml += `
                <div class="flex items-center">
                    <div class="w-1 h-1 rounded-full bg-white/30 mr-2 shrink-0"></div>
                    <p class="font-mono text-[9px] md:text-[11px] text-white/50 uppercase tracking-[0.15em] truncate">TL: ${tlFirst}</p>
                </div>`;
            }
            if (rmFirst !== 'N/A') {
                listTagsHtml += `
                <div class="flex items-center">
                    <div class="w-1 h-1 rounded-full bg-accent-gold/50 mr-2 shrink-0"></div>
                    <p class="font-mono text-[9px] md:text-[11px] text-accent-gold/70 uppercase tracking-[0.15em] truncate">MGR: ${rmFirst}</p>
                </div>`;
            }
                
            const fillPercentage = Math.max(3, (employee.sales / maxSalesBenchmark) * 100);

            // Conditional styling based on rank for ultimate coolness
            let rankNumberStyle = ""; 
            let laserGlow = "";
            let ringGlow = "";
            
            if (rank === 2) {
                rankNumberStyle = "bg-gradient-to-b from-gray-100 via-gray-300 to-gray-600";
                laserGlow = "background: linear-gradient(90deg, transparent, #E2E8F0); box-shadow: 0 0 15px #E2E8F0;";
                ringGlow = "border-gray-300/50 shadow-[0_0_20px_rgba(226,232,240,0.2)]";
            } else if (rank === 3) {
                rankNumberStyle = "bg-gradient-to-b from-orange-200 via-amber-500 to-amber-800";
                laserGlow = "background: linear-gradient(90deg, transparent, #D97706); box-shadow: 0 0 15px #D97706;";
                ringGlow = "border-amber-500/50 shadow-[0_0_20px_rgba(217,119,6,0.2)]";
            } else {
                rankNumberStyle = "bg-gradient-to-b from-cyan-200 via-blue-400 to-indigo-600";
                laserGlow = "background: linear-gradient(90deg, transparent, #00E5FF); box-shadow: 0 0 15px #00E5FF;";
                ringGlow = "border-cyan-400/30 shadow-[0_0_20px_rgba(0,229,255,0.15)]";
            }

            return `
                <div class="flex-1 w-full glass-card flex flex-col justify-center px-6 md:px-8 relative animate-slide-left group" style="animation-delay: ${(rank-1) * 0.15}s;">
                    
                    <!-- Hover Light Sweep -->
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000 ease-in-out pointer-events-none"></div>

                    <div class="flex items-center justify-between w-full z-10 relative">
                        
                        <!-- Left Side -->
                        <div class="flex items-center gap-5 md:gap-8 min-w-0 flex-1">
                            
                            <!-- Metallic Number -->
                            <div class="font-mono text-5xl md:text-6xl font-bold w-16 md:w-20 shrink-0 bg-clip-text text-transparent ${rankNumberStyle} opacity-90 tracking-tighter">0${rank}</div>
                            
                            <!-- Glowing Avatar (Increased Size for more clarity and presence) -->
                            <div class="w-[14vh] h-[14vh] md:w-[17vh] md:h-[17vh] min-w-[85px] min-h-[85px] rounded-full border-2 ${ringGlow} overflow-hidden shrink-0 relative p-1 bg-black/50">
                                <div class="w-full h-full rounded-full overflow-hidden">
                                    ${photoHtml}
                                </div>
                            </div>
                            
                            <!-- Name & Info -->
                            <div class="flex flex-col min-w-0 pr-4">
                                <h3 class="font-sans font-bold list-name text-white drop-shadow-md truncate">${employee.name}</h3>
                                <div class="flex flex-col gap-1 mt-1.5 min-w-0">
                                    ${listTagsHtml}
                                </div>
                            </div>
                        </div>

                        <!-- Right Side: Revenue -->
                        <div class="flex flex-col items-end shrink-0 pl-4">
                            <div class="font-mono font-bold list-rev text-white numeric-counter drop-shadow-lg" data-target-value="${employee.sales}">
                                <span class="currency-symbol">₹</span>0
                            </div>
                        </div>
                        
                    </div>

                    <!-- Laser Progress Line -->
                    <div class="progress-line">
                        <div class="progress-line-fill" style="width: 0%; ${laserGlow}" data-target-width="${fillPercentage}%"></div>
                    </div>
                </div>
            `;
        }

        async function fetchAndMergeData() {
            const cb = Date.now();
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([ fetch(photosUrl), fetch(salesUrl) ]);
                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        if (fullName && photoUrl) {
                            let cleanUrl = photoUrl;
                            // Requesting w1200 instead of w800 for maximum clarity
                            const driveMatch = photoUrl.match(/(?:\/d\/|id=)([\w-]+)/);
                            if (driveMatch && driveMatch[1]) cleanUrl = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w1200`;
                            
                            exactPhotoMap.set(fullName, cleanUrl);
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) firstNamePhotoMap.set(firstName, cleanUrl);
                        }
                    }
                });

                const mergedData = [];
                
                salesRaw.forEach((row) => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); 
                    const tl = (row[2] || '').toString().trim() || 'N/A'; 
                    const rm = (row[3] || '').toString().trim() || 'N/A'; 

                    let cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && name.toLowerCase() !== 'employee name') {
                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;
                        
                        mergedData.push({ name, sales: achieved, tl, rm, photo: matchedPhoto });
                    }
                });

                mergedData.sort((a, b) => b.sales - a.sales);
                return mergedData.slice(0, 5);

            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function renderLeaderboard(data) {
            if (!data || data.length === 0) return;

            const newDataHash = JSON.stringify(data);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            maxSalesBenchmark = data[0].sales;

            const heroSlot = document.getElementById('hero-slot');
            const contendersSlot = document.getElementById('contenders-slot');

            heroSlot.innerHTML = ''; 
            contendersSlot.innerHTML = '';

            if (data[0]) heroSlot.innerHTML = buildHeroCard(data[0]);
            
            for (let i = 1; i < 5; i++) {
                if (data[i]) contendersSlot.innerHTML += buildListCard(data[i], i + 1);
            }

            // Staggered Animations
            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 2500); 
                });

                document.querySelectorAll('.progress-line-fill').forEach((bar, index) => {
                    setTimeout(() => { bar.style.width = bar.getAttribute('data-target-width'); }, 300 + (index * 150));
                });
            }, 100);

            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => { loader.classList.add('hidden'); }, 500);
            }
        }

        async function updateDashboard() {
            try { renderLeaderboard(await fetchAndMergeData()); } 
            catch (err) { console.warn("Sync Issue:", err.message); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);

            const fullscreenBtn = document.getElementById('fullscreen-btn');
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                    fullscreenBtn.classList.add('text-white', 'bg-white/10');
                } else {
                    document.exitFullscreen();
                    fullscreenBtn.classList.remove('text-white', 'bg-white/10');
                }
            });
        });
    </script>
</body>
