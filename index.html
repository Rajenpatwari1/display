    <script>
        tailwind.config = {
            theme: {

                    fontFamily: {

    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            margin: 0;

        /* Matte Noise Texture - Adds an ultra-premium subtle grain */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 3;
            opacity: 0.06;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        /* ULTRA-PREMIUM BACKGROUND SYSTEM */
        .premium-bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-color: #030305; /* Deepest abyss black */
            overflow: hidden;
        }

        /* High-tech fading grid */
        .cyber-grid {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            /* Fades the grid out at the edges */
            -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
            pointer-events: none;
        }

        /* Animated Liquid Mesh Orbs */
        .mesh-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.5;
            animation: orbDrift 25s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-gold {
            width: 70vw; height: 70vw;
            background: rgba(184, 134, 11, 0.12); /* Deep Gold */
            top: -20%; left: -10%;
        }

        .orb-cyan {
            width: 60vw; height: 60vw;
            background: rgba(8, 145, 178, 0.12); /* Deep Cyan */
            bottom: -10%; right: -10%;
            animation-delay: -7s;
            animation-duration: 28s;
        }

        .orb-emerald {
            width: 50vw; height: 50vw;
            background: rgba(16, 185, 129, 0.08); /* Emerald Green */
            top: 40%; left: 30%;
            animation-delay: -15s;
            animation-duration: 32s;
        }

        @keyframes orbDrift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(4%, 6%) scale(1.05); }
            66% { transform: translate(-3%, 4%) scale(0.95); }
            100% { transform: translate(2%, -4%) scale(1.1); }
        }

        /* Ultra-Premium Glass Cards */
        .architectural-glass {
            background: linear-gradient(145deg, rgba(30, 30, 35, 0.4) 0%, rgba(15, 15, 18, 0.6) 100%);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15); /* Light catching the top edge */
            box-shadow: 
                0 30px 60px -10px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Shimmer overlay for cards */
        .architectural-glass::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.03) 25%, transparent 30%);
            background-size: 200% 200%;
            animation: lightSweep 8s linear infinite;
            pointer-events: none;
        }

        /* Metallic Text Gradients */
        .text-metallic-gold {
            background: linear-gradient(to bottom right, #FFDF73, #D4AF37, #997A15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 20px rgba(212, 175, 55, 0.3);
        }

        .text-metallic-silver {
            background: linear-gradient(to bottom right, #FFFFFF, #E2E8F0, #94A3B8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 20px rgba(226, 232, 240, 0.2);
        }

        .text-metallic-bronze {
            background: linear-gradient(to bottom right, #FDBA74, #D97706, #92400E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 20px rgba(217, 119, 6, 0.2);
        }

        /* Elegant Watermarks */
        .premium-watermark {
            position: absolute;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16rem;
            font-weight: 800;
            line-height: 1;
            z-index: 0;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.03;
            pointer-events: none;
            user-select: none;
            letter-spacing: -0.05em;

        /* Hidden Scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        /* Subtle Avatar Glow Ring */
        .avatar-ring-gold { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), inset 0 0 10px rgba(212, 175, 55, 0.2); border: 2px solid rgba(212, 175, 55, 0.6); }
        .avatar-ring-silver { box-shadow: 0 0 25px rgba(226, 232, 240, 0.2); border: 2px solid rgba(226, 232, 240, 0.4); }
        .avatar-ring-bronze { box-shadow: 0 0 25px rgba(217, 119, 6, 0.2); border: 2px solid rgba(217, 119, 6, 0.4); }
        .avatar-ring-standard { border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>

    <script>
        // Google Sheet Configuration
        const SHEET_ID = '1zm49yxiWzi8LCrazWa7VMTNQO0f5qPRmY3Sf0ILVyQw';
        const SHEET_NAME_PHOTOS = 'Employee Photo';
        const SHEET_NAME_SALES = 'Sheet2';
        const REFRESH_INTERVAL_MS = 1500; // Ultra-fast microsecond sync
        let previousDataHash = "";

        const container = document.getElementById('leaderboard-container');
        const row1 = document.getElementById('row-1');
        const row2 = document.getElementById('row-2');
        const row3 = document.getElementById('row-3');
        const loader = document.getElementById('loader');

        // Robust CSV Parser
        function parseCSV(text) {
            const result = [];
            let row = [];
            let inQuotes = false;
            let currentValue = "";
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i+1] === '"') { currentValue += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(currentValue); currentValue = "";
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i+1] === '\n') i++; 
                    row.push(currentValue); result.push(row); row = []; currentValue = "";
                } else { currentValue += char; }
            }
            if (currentValue || row.length > 0) { row.push(currentValue); result.push(row); }
            return result;
        }

        // Image URL formatter
        function formatImageUrl(url) {
            if (!url) return '';
            const driveMatch = url.match(/(?:\/d\/|id=)([\w-]+)/);
            if (driveMatch && driveMatch[1]) {
                return `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
            }
            return url;
        }

        // Indian Rupee Formatter
        function formatRupees(num) {
            return new Intl.NumberFormat('en-IN', {
                style: 'currency', currency: 'INR', maximumFractionDigits: 0
            }).format(num);
        }

        // Cinematic ease-out number counter
        function animateValue(element, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Expo ease out for dramatic slow down at the end
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentVal = Math.floor(easeOut * (end - start) + start);
                element.innerHTML = formatRupees(currentVal);
                if (progress < 1) window.requestAnimationFrame(step);
                else element.innerHTML = formatRupees(end); 
            };
            window.requestAnimationFrame(step);
        }

        async function fetchAndMergeData() {
            const cb = Date.now(); // Cache buster
            const photosUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_PHOTOS)}&z=${cb}`;
            const salesUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME_SALES)}&z=${cb}`;

            try {
                const [photosRes, salesRes] = await Promise.all([
                    fetch(photosUrl, { cache: 'no-store' }),
                    fetch(salesUrl, { cache: 'no-store' })
                ]);

                if (!photosRes.ok || !salesRes.ok) throw new Error("Data access denied.");

                const photosRaw = parseCSV(await photosRes.text());
                const salesRaw = parseCSV(await salesRes.text());

                // Map Photos (Col A: Name, Col G (index 6): Photo)
                const exactPhotoMap = new Map();
                const firstNamePhotoMap = new Map();
                
                photosRaw.forEach(row => {
                    if (row.length >= 7) {
                        const fullName = (row[0] || '').trim().toLowerCase();
                        const photoUrl = (row[6] || '').trim();
                        
                        if (fullName && photoUrl) {
                            const formattedUrl = formatImageUrl(photoUrl);
                            // 1. Store Exact Match
                            exactPhotoMap.set(fullName, formattedUrl);
                            
                            // 2. Store First Name Match (for fuzzy fallback)
                            const firstName = fullName.split(/\s+/)[0]; 
                            if (firstName && !firstNamePhotoMap.has(firstName)) {
                                firstNamePhotoMap.set(firstName, formattedUrl);
                            }
                        }
                    }
                });

                const mergedData = [];
                
                // Process every single row for maximum accuracy
                salesRaw.forEach(row => {
                    const name = (row[0] || '').toString().trim();
                    const rawSalesStr = (row[1] || '').toString().trim(); // Column B: Revenue
                    const tl = (row[2] || '').toString().trim() || 'N/A'; // Column C: TL
                    const rm = (row[3] || '').toString().trim() || 'N/A'; // Column D: RM

                    // ULTRA CLEANER: Removes ALL hidden formatting, commas, text. Keeps pure digits.
                    const cleanSalesStr = rawSalesStr.replace(/[^0-9.-]+/g, "");
                    const achieved = parseFloat(cleanSalesStr);
                    
                    if (name && !isNaN(achieved) && achieved > 0 && !name.toLowerCase().includes('employee name')) {
                        
                        // SMART MATCHING: Try Exact Name first. If that fails, try matching just the First Name.
                        const searchNameLower = name.toLowerCase();
                        const searchFirstName = searchNameLower.split(/\s+/)[0];
                        const matchedPhoto = exactPhotoMap.get(searchNameLower) || firstNamePhotoMap.get(searchFirstName) || null;

                        mergedData.push({
                            name: name,
                            sales: achieved,
                            tl: tl,
                            rm: rm,
                            photo: matchedPhoto
                        });
                    }
                });

                return mergedData;
            } catch (error) {
                console.error("Sync Error:", error);
                throw error;
            }
        }

        function buildCard(employee, rank) {
            // Base configuration for an ultra-premium aesthetic
            let config = {

                cardSize: 'w-[260px] md:w-[280px]',
                numberSize: 'text-2xl md:text-3xl'
            };
            
            // APEX: Rank #1 (GOLD)
            if (rank === 1) {
                config.textColorClass = 'text-metallic-gold';
                config.ringClass = 'avatar-ring-gold';
                config.avatarSize = 'w-28 h-28 md:w-36 md:h-36';
                config.extraClasses = 'transform scale-105 md:scale-110 z-30 mx-auto animate-float-slow';
                config.watermark = '01';
                config.cardSize = 'w-[300px] md:w-[360px] px-8 py-10';
                config.numberSize = 'text-4xl md:text-5xl lg:text-6xl';
                config.crown = `
                    <div class="absolute -top-10 md:-top-12 z-20 animate-pulse-glow">
                        <svg class="w-12 h-12 md:w-16 md:h-16 text-[#D4AF37] drop-shadow-[0_0_15px_rgba(212,175,55,0.6)]" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm14 3c0 .6-.4 1-1 1H6c-.6 0-1-.4-1-1v-1h14v1z"/>
                        </svg>
                    </div>`;
            } 
            // ELITE: Rank #2 (SILVER)
            else if (rank === 2) {
                config.textColorClass = 'text-metallic-silver';
                config.ringClass = 'avatar-ring-silver';
                config.avatarSize = 'w-20 h-20 md:w-28 md:h-28';
                config.extraClasses = 'z-20 animate-float-med';
                config.watermark = '02';
                config.cardSize = 'w-[280px] md:w-[320px] px-6 py-8';
                config.numberSize = 'text-3xl md:text-4xl lg:text-5xl';
            } 
            // ELITE: Rank #3 (BRONZE)
            else if (rank === 3) {
                config.textColorClass = 'text-metallic-bronze';
                config.ringClass = 'avatar-ring-bronze';
                config.avatarSize = 'w-20 h-20 md:w-28 md:h-28';
                config.extraClasses = 'z-20 animate-float-med';
                config.watermark = '03';
                config.cardSize = 'w-[280px] md:w-[320px] px-6 py-8';
                config.numberSize = 'text-3xl md:text-4xl lg:text-5xl';
            }

            // Fallback Image
            const initial = employee.name.charAt(0).toUpperCase();
            const photoHtml = employee.photo 
                ? `<img src="${employee.photo}" alt="${employee.name}" onerror="this.onerror=null;this.parentNode.innerHTML='<div class=\\'w-full h-full flex items-center justify-center bg-slate-800 text-slate-300 text-3xl font-display font-black\\'>${initial}</div>';" class="w-full h-full object-cover">`
                : `<div class="w-full h-full flex items-center justify-center bg-slate-800 text-slate-300 text-2xl md:text-4xl font-display font-black">${initial}</div>`;

            // Apple-style Manager Tags
            let managerTagsHtml = '';
            const tlClean = (employee.tl || '').toLowerCase().trim();
            const rmClean = (employee.rm || '').toLowerCase().trim();

            if (tlClean === rmClean || tlClean === '' || tlClean === 'n/a') {
                const displayName = employee.rm !== 'n/a' ? employee.rm : (employee.tl !== 'n/a' ? employee.tl : 'Unassigned');
                managerTagsHtml = `
                    <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-xl border border-white/[0.05] px-4 py-2 backdrop-blur-sm">
                        <span class="text-[8px] md:text-[9px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5">Manager</span>
                        <span class="text-[11px] md:text-xs text-slate-200 font-display font-medium truncate max-w-[140px]">${displayName}</span>
                    </div>
                `;
            } else {
                managerTagsHtml = `
                    <div class="flex flex-row items-center justify-center gap-3 w-full">
                        <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-xl border border-white/[0.05] px-3 py-1.5 backdrop-blur-sm w-[100px]">
                            <span class="text-[8px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5">Team Lead</span>
                            <span class="text-[10px] md:text-[11px] text-slate-200 font-display font-medium w-full text-center truncate">${employee.tl}</span>
                        </div>
                        <div class="inline-flex flex-col items-center justify-center bg-white/[0.03] rounded-xl border border-white/[0.05] px-3 py-1.5 backdrop-blur-sm w-[100px]">
                            <span class="text-[8px] text-slate-400 font-sans font-bold uppercase tracking-widest mb-0.5">Manager</span>
                            <span class="text-[10px] md:text-[11px] text-slate-200 font-display font-medium w-full text-center truncate">${employee.rm}</span>
                        </div>
                    </div>
                `;
            }

            // Return Final Card HTML
            return `
                <div class="architectural-glass flex flex-col items-center rounded-[2.5rem] ${config.cardSize} ${config.extraClasses} animate-reveal-up" style="animation-delay: ${rank * 0.15}s;">
                    
                    <!-- Massive Elegant Watermark -->
                    <div class="premium-watermark text-white">${config.watermark}</div>
                    
                    ${config.crown}
                    
                    <!-- Avatar Profile -->
                    <div class="relative z-10 ${config.avatarSize} rounded-full overflow-hidden ${config.ringClass} flex-shrink-0 bg-[#0a0a0c] mb-5 shadow-2xl p-1">
                        <div class="w-full h-full rounded-full overflow-hidden">
                            ${photoHtml}
                        </div>
                    </div>
                    
                    <!-- Employee Name -->
                    <h2 class="relative z-10 font-display text-xl md:text-2xl font-bold text-white text-center w-full tracking-tight truncate mb-4 drop-shadow-md">
                        ${employee.name}
                    </h2>
                    
                    <!-- Manager Tags -->
                    <div class="relative z-10 w-full mb-6 flex justify-center">
                        ${managerTagsHtml}
                    </div>
                    
                    <!-- Divider line -->
                    <div class="w-2/3 h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent mb-5 relative z-10"></div>
                    
                    <!-- Revenue Numbers -->
                    <div class="relative z-10 flex flex-col items-center w-full">
                        <div class="text-[9px] md:text-[10px] text-slate-500 font-sans font-bold mb-1 uppercase tracking-[0.25em]">Revenue Achieved</div>
                        <div class="font-display ${config.numberSize} font-extrabold ${config.textColorClass} tracking-tighter numeric-counter" data-target-value="${employee.sales}">
                            ₹0
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard(data) {
            // Sort mathematically: Highest Sales to Lowest
            data.sort((a, b) => b.sales - a.sales);
            
            // Extract strictly Top 5
            const top5 = data.slice(0, 5);
            
            // Compare Hash to prevent screen flashing
            const newDataHash = JSON.stringify(top5);
            if (newDataHash === previousDataHash) return; 
            previousDataHash = newDataHash;
            
            if (top5.length === 0) return;

            // Clear rows
            row1.innerHTML = ''; 
            row2.innerHTML = '';
            row3.innerHTML = '';

            // Inject Cards into Architectural Pyramid
            if (top5[0]) row1.innerHTML += buildCard(top5[0], 1);
            if (top5[1]) row2.innerHTML += buildCard(top5[1], 2);
            if (top5[2]) row2.innerHTML += buildCard(top5[2], 3);
            if (top5[3]) row3.innerHTML += buildCard(top5[3], 4);
            if (top5[4]) row3.innerHTML += buildCard(top5[4], 5);

            // Animate Numbers rolling up cinematically
            setTimeout(() => {
                document.querySelectorAll('.numeric-counter').forEach(counter => {
                    const targetValue = parseFloat(counter.getAttribute('data-target-value'));
                    animateValue(counter, 0, targetValue, 3000); 
                });
            }, 100);

            // Reveal Dashboard gracefully
            if (!loader.classList.contains('hidden')) {
                loader.classList.add('opacity-0');
                setTimeout(() => {
                    loader.classList.add('hidden');
                    container.classList.remove('opacity-0');
                    container.classList.add('opacity-100');
                }, 700);
            }
        }

        async function updateDashboard() {
            try {
                const data = await fetchAndMergeData();
                renderLeaderboard(data);
            } catch (err) {
                console.warn("Sync Interrupted. Retrying in 1.5s:", err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
            setInterval(updateDashboard, REFRESH_INTERVAL_MS);
        });

    </script>
</body>
</html>
